services:
  video-compressor:
    build: .
    container_name: video-compressor
    ports:
      - "5050:5050"
    volumes:
      - ./data:/data
    environment:
      - DATA_DIR=/data
      - HOST=0.0.0.0
      - PORT=5050
    restart: unless-stopped
    # ----- 可选：Intel QSV 硬件加速（取消注释下面两行）-----
    # devices:
    #   - /dev/dri:/dev/dri
